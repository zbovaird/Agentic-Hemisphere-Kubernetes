name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/hemisphere-repo

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov pydantic fastapi httpx \
            structlog kopf kubernetes pyyaml uvicorn

      - name: Run tests
        run: |
          python -m pytest tests/ terraform/tests/ -v --tb=short \
            -m "not integration" \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  docker-build:
    name: Docker Build (validation)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: rh-planner, context: docker/rh-planner }
          - { name: lh-executor, context: docker/lh-executor }
          - { name: operator, context: operator }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.image.name }}
        run: |
          docker build -t ${{ matrix.image.name }}:ci ${{ matrix.image.context }}/

  security-scan:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pydantic pyyaml kopf kubernetes structlog

      - name: Run security tests
        run: |
          python -m pytest tests/benchmarks/test_security.py -v

  cloud-build:
    name: Build & Push Images (Cloud Build)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, terraform-validate, docker-build, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        run: |
          gcloud builds submit . \
            --project="${GCP_PROJECT}" \
            --config=cloudbuild.yaml \
            --substitutions="_REGISTRY=${REGISTRY}" \
            --quiet

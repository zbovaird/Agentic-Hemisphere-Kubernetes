apiVersion: v1
kind: ResourceQuota
metadata:
  name: employee-compute-quota
  namespace: employee
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "2Gi"
    limits.cpu: "4"
    limits.memory: "4Gi"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: employee-limit-range
  namespace: employee
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "1Gi"
      defaultRequest:
        cpu: "250m"
        memory: "512Mi"
      max:
        cpu: "1"
        memory: "2Gi"
    - type: Pod
      max:
        cpu: "1"
        memory: "2Gi"

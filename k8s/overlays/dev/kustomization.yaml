apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Registry is injected by deploy script from terraform.tfvars project_id
# Placeholder replaced at apply time: REGISTRY_PLACEHOLDER -> REGION-docker.pkg.dev/PROJECT_ID/hemisphere-repo
images:
  - name: rh-planner:latest
    newName: REGISTRY_PLACEHOLDER/rh-planner
    newTag: latest
  - name: operator:latest
    newName: REGISTRY_PLACEHOLDER/operator
    newTag: latest
  - name: lh-executor:latest
    newName: REGISTRY_PLACEHOLDER/lh-executor
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: rh-planner
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
  - target:
      kind: Deployment
      name: hemisphere-operator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "REGISTRY_PLACEHOLDER/lh-executor:latest"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

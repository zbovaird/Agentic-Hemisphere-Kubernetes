apiVersion: v1
kind: Pod
metadata:
  labels:
    app: lh-executor
    hemisphere: left
    managed-by: hemisphere-operator
spec:
  serviceAccountName: lh-executor
  runtimeClassName: gvisor
  restartPolicy: Never
  automountServiceAccountToken: true
  containers:
    - name: executor
      image: "${LH_EXECUTOR_IMAGE}"
      env:
        - name: TASK_SPEC
          value: "${TASK_SPEC_JSON}"
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: task
          mountPath: /task
  volumes:
    - name: tmp
      emptyDir:
        sizeLimit: 100Mi
    - name: task
      emptyDir:
        sizeLimit: 50Mi
  tolerations:
    - key: "sandbox.gke.io/runtime"
      operator: "Equal"
      value: "gvisor"
      effect: "NoSchedule"
